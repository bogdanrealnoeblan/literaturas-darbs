<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Foto</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background: linear-gradient(135deg,#e6f4ff,#ffffff);
}
nav{
 background: rgba(255,255,255,0.8);
 backdrop-filter: blur(10px);
 padding:15px;
 text-align:center;
 position:sticky;
 top:0;
}
nav a{
 margin:0 15px;
 text-decoration:none;
 color:#333;
 font-weight:600;
 transition:0.3s;
}
nav a:hover{ color:#0077ff; }
.container{
 width:75%;
 margin:60px auto;
}
.card{
 background:white;
 padding:30px;
 border-radius:20px;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 margin-bottom:30px;
 text-align:center;
 animation:fadeIn 1s ease;
}

.gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;
}

.frame{
 height:200px;
 border-radius:15px;
 overflow:hidden;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
 cursor:pointer;
}

.frame img{
 width:100%;
 height:100%;
 object-fit:cover;
 transition:0.3s;
}

.frame:hover img{
 transform:scale(1.1);
}

/* модалка */
.modal{
 display:none;
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 justify-content:center;
 align-items:center;
}

.modal img{
 max-width:80%;
 max-height:80%;
 border-radius:15px;
}
</style>
</head>

<body>

<nav>
<a href="index.html">Sākumlapa</a>
<a href="gramata.html">Grāmata</a>
<a href="kapec.html">Kāpēc šī grāmata?</a>
<a href="foto.html">Foto</a>
</nav>

<div class="container">
<h1 style="text-align:center;">Foto galerija</h1>

<div class="gallery">
<div class="frame"><img src="https://i.ibb.co/Yr4R5Gq/photo-2026-04-06-22-04-49.jpg" alt="photo 2026 04 06 22 04 49" border="0"></div>
<div class="frame"><img src="https://i.ibb.co/Kj280Vt1/photo-2026-04-06-22-06-25.jpg" alt="photo 2026 04 06 22 06 25" border="0"></div>
<div class="frame"><img src="https://i.ibb.co/tPs1zR5Q/photo-2026-04-06-22-00-11.jpg" alt="photo 2026 04 06 22 00 11" border="0"></div>
<div class="frame"><img src="https://i.ibb.co/Yr4R5Gq/photo-2026-04-06-22-04-49.jpg" alt="photo 2026 04 06 22 04 49" border="0"></div>
</div>
</div>

<div class="modal" id="modal">
<img id="modalImg">
</div>

<script>
const imgs = document.querySelectorAll('.frame img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');

imgs.forEach(img=>{
 img.onclick = ()=>{
  modal.style.display='flex';
  modalImg.src = img.src;
 }
});

modal.onclick = ()=> modal.style.display='none';
</script>

</body>
</html>
