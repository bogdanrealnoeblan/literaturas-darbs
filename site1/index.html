<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<title>Sākumlapa</title>
<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background: linear-gradient(135deg,#e6f4ff,#ffffff);
}
nav{
 background: rgba(255,255,255,0.8);
 backdrop-filter: blur(10px);
 padding:15px;
 text-align:center;
 position:sticky;
 top:0;
}
nav a{
 margin:0 15px;
 text-decoration:none;
 color:#333;
 font-weight:600;
 transition:0.3s;
}
nav a:hover{ color:#0077ff; }
.container{
 width:75%;
 margin:60px auto;
}
.card{
 background:white;
 padding:30px;
 border-radius:20px;
 box-shadow:0 10px 25px rgba(0,0,0,0.1);
 margin-bottom:30px;
 text-align:center;
 animation:fadeIn 1s ease;
}
.gallery{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
 gap:20px;
}
.frame{
 height:200px;
 background:#f0f8ff;
 border-radius:15px;
 box-shadow:0 5px 15px rgba(0,0,0,0.1);
 display:flex;
 align-items:center;
 justify-content:center;
 color:#888;
 font-size:14px;
}
@keyframes fadeIn{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<nav>

</div>

</html>
